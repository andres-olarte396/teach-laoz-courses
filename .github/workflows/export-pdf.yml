name: 📄 Exportar Cursos a PDF

on:
  workflow_dispatch:
    inputs:
      course_path:
        description: 'Ruta al directorio del curso (ej: curso-IA-AUTOMATIZACION)'
        required: true
        default: 'curso-IA-AUTOMATIZACION'
      create_release:
        description: 'Crear release con los PDFs'
        type: boolean
        default: false
  
  push:
    tags:
      - 'v*'  # Ejecutar cuando se cree un tag de versión

jobs:
  export-pdf:
    name: 📚 Exportar a PDF
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        run: |
          pip install pyyaml

      - name: 📄 Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: 🔍 Validate Course Directory
        run: |
          course_path="${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}"
          
          if [ ! -d "$course_path" ]; then
            echo "❌ Error: Directorio del curso no existe: $course_path"
            exit 1
          fi
          
          if [ ! -f "$course_path/curso.yaml" ]; then
            echo "❌ Error: No se encontró curso.yaml en $course_path"
            exit 1
          fi
          
          echo "✅ Directorio del curso válido: $course_path"

      - name: 📖 Generate Course Content (if needed)
        run: |
          course_path="${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}"
          
          echo "🔄 Verificando contenido del curso..."
          
          # Generar contenido si no existe
          if [ ! -f "$course_path/README.md" ] || [ ! -f "$course_path/roadmap.md" ]; then
            echo "📝 Generando contenido faltante del curso..."
            if [ -f "$course_path/scripts/generate_course.py" ]; then
              python "$course_path/scripts/generate_course.py" "$course_path/curso.yaml"
            else
              echo "⚠️ Script de generación no encontrado, continuando con contenido existente"
            fi
          else
            echo "✅ Contenido del curso ya existe"
          fi

      - name: 📄 Export to PDF
        run: |
          course_path="${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}"
          
          echo "🚀 Iniciando exportación a PDF..."
          
          # Hacer el script ejecutable
          chmod +x "$course_path/scripts/export_pdf.sh"
          
          # Ejecutar exportación
          cd "$course_path"
          ./scripts/export_pdf.sh .

      - name: 📊 Generate Export Summary
        run: |
          course_path="${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}"
          export_dir="$course_path/exports/pdf"
          
          if [ -d "$export_dir" ]; then
            echo "📈 Archivos PDF generados:" > export-summary.md
            echo "" >> export-summary.md
            
            # Listar archivos PDF generados
            find "$export_dir" -name "*.pdf" -type f | while read pdf_file; do
              file_size=$(du -h "$pdf_file" | cut -f1)
              echo "- **$(basename "$pdf_file")** ($file_size)" >> export-summary.md
            done
            
            echo "" >> export-summary.md
            echo "**Total archivos:** $(find "$export_dir" -name "*.pdf" -type f | wc -l)" >> export-summary.md
            echo "**Generado el:** $(date '+%Y-%m-%d %H:%M:%S')" >> export-summary.md
            
            # Mostrar resumen en el log
            echo "📊 Resumen de exportación:"
            cat export-summary.md
          else
            echo "❌ Error: No se encontró directorio de exportación"
            exit 1
          fi

      - name: 📤 Upload PDF Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: course-pdfs-${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}
          path: |
            ${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}/exports/pdf/*.pdf
          retention-days: 90

      - name: 📋 Create Job Summary
        run: |
          course_path="${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}"
          export_dir="$course_path/exports/pdf"
          
          {
            echo "# 📄 Resumen de Exportación a PDF"
            echo ""
            echo "**Curso:** $course_path"
            echo "**Fecha:** $(date '+%Y-%m-%d %H:%M:%S')"
            echo "**Commit:** ${{ github.sha }}"
            echo ""
            
            if [ -d "$export_dir" ]; then
              echo "## 📚 Archivos Generados"
              echo ""
              find "$export_dir" -name "*.pdf" -type f | while read pdf_file; do
                file_size=$(du -h "$pdf_file" | cut -f1)
                echo "- **$(basename "$pdf_file")** ($file_size)"
              done
              
              total_files=$(find "$export_dir" -name "*.pdf" -type f | wc -l)
              echo ""
              echo "**Total:** $total_files archivos PDF"
              echo ""
              echo "✅ **Estado:** Exportación exitosa"
            else
              echo "❌ **Estado:** Error en la exportación"
            fi
          } >> $GITHUB_STEP_SUMMARY

  create-release:
    name: 🏷️ Crear Release
    runs-on: ubuntu-latest
    needs: export-pdf
    if: ${{ github.event.inputs.create_release == 'true' || startsWith(github.ref, 'refs/tags/') }}
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📄 Download PDF Artifacts
        uses: actions/download-artifact@v3
        with:
          name: course-pdfs-${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}
          path: ./pdfs

      - name: 📦 Create ZIP Archive
        run: |
          course_path="${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}"
          
          # Crear nombre del archivo ZIP
          timestamp=$(date '+%Y%m%d-%H%M%S')
          zip_name="${course_path}-pdfs-${timestamp}.zip"
          
          # Crear ZIP con todos los PDFs
          cd pdfs
          zip -r "../$zip_name" *.pdf
          cd ..
          
          echo "📦 Archivo ZIP creado: $zip_name"
          echo "ZIP_NAME=$zip_name" >> $GITHUB_ENV

      - name: 🏷️ Get or Create Tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Para ejecución manual, crear tag basado en fecha
            tag_name="export-$(date '+%Y%m%d-%H%M%S')"
            echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
            
            # Crear tag
            git config user.name "PDF Export Bot"
            git config user.email "pdf-bot@github-actions.noreply.com"
            git tag -a "$tag_name" -m "PDF Export for ${{ github.event.inputs.course_path }}"
            git push origin "$tag_name"
          else
            # Para push de tag
            tag_name="${GITHUB_REF#refs/tags/}"
            echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          release_name: 📚 Course PDFs - ${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}
          body: |
            # 📄 Exportación de Curso a PDF
            
            **Curso:** ${{ github.event.inputs.course_path || 'curso-IA-AUTOMATIZACION' }}
            **Fecha de generación:** $(date '+%Y-%m-%d %H:%M:%S')
            **Commit:** ${{ github.sha }}
            
            ## 📥 Descargas Disponibles
            
            - **ZIP completo:** Todos los archivos PDF del curso
            - **PDFs individuales:** Cada archivo por separado
            
            ## 📋 Contenido
            
            Este release contiene la versión PDF completa del curso, incluyendo:
            - README principal del curso
            - Roadmap detallado
            - Documentación de cada módulo
            - PDF combinado con todo el contenido
            
            ## 🛠️ Generado con
            
            - Pandoc + XeLaTeX
            - GitHub Actions
            - Scripts de automatización personalizados
            
            ---
            
            *Generado automáticamente por GitHub Actions*
          draft: false
          prerelease: false

      - name: 📎 Upload ZIP to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.ZIP_NAME }}
          asset_name: ${{ env.ZIP_NAME }}
          asset_content_type: application/zip